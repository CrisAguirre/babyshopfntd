<app-header></app-header>

<main class="cart-page">
  <div class="container mt-5 mb-5">
    <button class="btn btn-outline back-btn mb-4" (click)="goBack()">
      <span class="material-icons-round">arrow_back</span> Seguir comprando
    </button>

    <div class="cart-header mb-4">
      <h1>Tu Carrito de Compras</h1>
      <p class="text-muted" *ngIf="items.length > 0">Tienes {{ items.length }} artículo(s) seleccionados.</p>
    </div>

    <!-- Carrito Vacío -->
    <div *ngIf="items.length === 0" class="empty-cart text-center mt-5 mb-5">
      <span class="material-icons-round empty-icon mb-3">shopping_basket</span>
      <h3>Tu carrito está vacío</h3>
      <p class="text-muted mb-4">¡Anímate a explorar nuestra colección de ropita y artículos para bebé!</p>
      <button class="btn btn-primary btn-lg" (click)="goBack()">Ver Catálogo</button>
    </div>

    <!-- Carrito con Productos -->
    <div *ngIf="items.length > 0" class="cart-layout">
      <!-- Lista de Items -->
      <div class="cart-items">
        <app-cart-item 
          *ngFor="let item of items" 
          [item]="item"
          (remove)="removeItem($event)">
        </app-cart-item>
        
        <div class="cart-actions mt-4 text-right">
          <button class="btn btn-outline text-danger" (click)="clearCart()">
            <span class="material-icons-round">delete_sweep</span> Vaciar Carrito
          </button>
        </div>
      </div>

      <!-- Resumen (Checkout) -->
      <div class="cart-sidebar">
        <app-cart-summary (checkout)="checkout()"></app-cart-summary>
      </div>
    </div>
  </div>
</main>

<app-footer></app-footer>
