<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="assets/logos/logo.png" alt="Logo" class="sidebar-logo">
      <h3>Panel Admin</h3>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">dashboard</span> Resumen
      </a>
      <a routerLink="/admin/productos" routerLinkActive="active" class="nav-item">
        <span class="material-icons-round">inventory_2</span> Productos
      </a>
      <!-- Add more routes later (Orders, Settings) -->
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <span class="material-icons-round">account_circle</span>
        <span>{{ adminName }}</span>
      </div>
      <button class="btn-logout" (click)="logout()">
        <span class="material-icons-round">logout</span> Salir
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="admin-main">
    <div class="admin-topbar">
      <h2>Shop Baby Shop - Administración</h2>
      <a routerLink="/" class="btn btn-outline" target="_blank">
        <span class="material-icons-round">open_in_new</span> Ver Tienda
      </a>
    </div>
    
    <div class="admin-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
