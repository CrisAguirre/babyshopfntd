<div class="login-page">
  <div class="login-card animate-slide-up">
    <div class="text-center mb-4">
      <img src="assets/logos/logo.png" alt="Shop Baby Shop" class="login-logo">
      <h2 class="mt-3">Panel de Administración</h2>
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>

    <div *ngIf="error" class="alert alert-danger mb-4">
      <span class="material-icons-round">error_outline</span>
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group mb-3">
        <label for="username">Usuario</label>
        <div class="input-wrapper">
          <span class="material-icons-round icon">person</span>
          <input type="text" id="username" formControlName="username" class="form-control" placeholder="admin">
        </div>
      </div>

      <div class="form-group mb-4">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="material-icons-round icon">lock</span>
          <input type="password" id="password" formControlName="password" class="form-control" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" [disabled]="loginForm.invalid || loading">
        <span class="spinner" *ngIf="loading"></span>
        <span *ngIf="!loading">Ingresar</span>
      </button>
      
      <a routerLink="/" class="back-link mt-4">
        <span class="material-icons-round">arrow_back</span> Volver a la tienda
      </a>
    </form>
  </div>
</div>
