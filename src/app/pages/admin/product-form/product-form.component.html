<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1>{{ isEditMode ? 'Editar Producto' : 'Nuevo Producto' }}</h1>
    <p class="text-muted">Completa la información de la ropita</p>
  </div>
  <button class="btn btn-outline" (click)="goBack()">Cancelar</button>
</div>

<div class="form-container">
  <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
    
    <div class="form-row">
      <div class="form-group flex-2">
        <label>Nombre del Producto *</label>
        <input type="text" formControlName="name" class="form-control" placeholder="Ej. Chaqueta Unisex H&M">
      </div>
      <div class="form-group flex-1">
        <label>Precio (COP) *</label>
        <input type="number" formControlName="price" class="form-control" placeholder="0">
      </div>
    </div>

    <div class="form-group">
      <label>Descripción *</label>
      <textarea formControlName="description" class="form-control" rows="4" placeholder="Describe los detalles, tela, etc."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Categoría *</label>
        <select formControlName="category" class="form-control">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat | titlecase }}</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Talla *</label>
        <input type="text" formControlName="size" class="form-control" placeholder="Ej. 6-9m">
      </div>
      
      <div class="form-group">
        <label>Marca</label>
        <input type="text" formControlName="brand" class="form-control" placeholder="Opcional">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Género *</label>
        <select formControlName="gender" class="form-control">
          <option *ngFor="let g of genders" [value]="g">{{ g | titlecase }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Condición *</label>
        <select formControlName="condition" class="form-control">
          <option *ngFor="let c of conditions" [value]="c">{{ c | titlecase }}</option>
        </select>
      </div>
    </div>

    <div class="form-group mt-3 mb-4">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="featured">
        Destacar este producto en el inicio
      </label>
    </div>

    <div class="form-actions mt-4 border-top pt-4">
      <button type="button" class="btn btn-outline" (click)="goBack()">Cancelar</button>
      <button type="submit" class="btn btn-primary" [disabled]="productForm.invalid || loading">
        {{ loading ? 'Guardando...' : 'Guardar Producto' }}
      </button>
    </div>

  </form>
</div>
